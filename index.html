<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Website Kamu</title>
</head>

<body>

<!-- KONTEN -->
<div id="tanggal"></div>
<div id="jam"></div>

<div id="dataList"></div>

<!-- SCRIPT SEMUA DI SINI -->
<script>

// DATA LIST (contoh)
const list = [
  {nama: "HUAHIN", angka: "8407"},
  {nama: "JAKARTA", angka: "9097"},
  {nama: "BANGKOK", angka: "8619"}
];

const data = document.getElementById('dataList');

// DUPLIKAT UNTUK SCROLL
const doubleList = [...list, ...list];

// RENDER DATA
function render(){
  let html = "";
  doubleList.forEach(item => {
    html += `<div class="cell">
      ${item.nama} <span class="num">${item.angka}</span>
    </div>`;
  });

  data.innerHTML = html;
}

// JAM + TANGGAL
function updateWaktu() {
    const now = new Date();

    let jam = now.getHours().toString().padStart(2, '0');
    let menit = now.getMinutes().toString().padStart(2, '0');
    let detik = now.getSeconds().toString().padStart(2, '0');

    document.getElementById("jam").innerHTML =
        "JAM " + jam + ":" + menit + ":" + detik + " WIB";

    const hari = ["MINGGU","SENIN","SELASA","RABU","KAMIS","JUMAT","SABTU"];
    const bulan = ["JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI","JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];

    let tgl = hari[now.getDay()] + " " + now.getDate() + " " + bulan[now.getMonth()] + " " + now.getFullYear();

    document.getElementById("tanggal").innerHTML = tgl;
}

// JALANKAN
render();
setInterval(updateWaktu, 1000);
updateWaktu();

</script>

</body>
</html>
