<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANAYA88</title>

<style>
body{margin:0;font-family:Arial;background:#062b40;color:#fff}
.wrap{max-width:1200px;margin:auto}

/* HEADER */
.top{background:#d8dce0;color:#000;text-align:center;padding:15px}
.banner-row{display:flex}
.banner{flex:1;height:60px;background:#9aa3aa;display:flex;align-items:center;justify-content:center;font-weight:bold}

/* TEXT JALAN */
.ticker{background:#f4bf62;padding:8px;overflow:hidden;white-space:nowrap}
.ticker span{display:inline-block;padding-left:100%;animation:marq 15s linear infinite}
@keyframes marq{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* LAYOUT */
.main{display:flex}
.left{flex:2}
.right{flex:1;padding:10px}

/* SCROLL PASARAN */
.scroll-box{height:420px;overflow:hidden;position:relative}
.scroll-inner{position:absolute;width:100%;animation:scrollUp 25s linear infinite}
@keyframes scrollUp{0%{top:0}100%{top:-50%}}

.cell{
border:1px solid #14c6d1;
padding:12px;
text-align:center;
}

.num{
background:#0a3c4f;
padding:4px 10px;
border-radius:8px;
margin-left:6px;
}

/* PANEL KANAN */
.panel{
border:1px solid #14c6d1;
padding:12px;
margin-bottom:10px;
border-radius:10px;
}

/* BANNER BESAR */
.big-banner{
height:260px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<h1>LANAYA88</h1>
<div>SITUS RESMI PASARAN TOGEL SELURUH DUNIA</div>
</div>

<div class="banner-row">
<div class="banner">IKLAN / BANNER</div>
<div class="banner">BANNER / BANNER</div>
</div>

<div class="ticker">
<span>TIAP HARI UPDATE DATA OTOMATIS, ANGKA BERJALAN PELAN</span>
</div>

<div class="main">

<!-- KIRI -->
<div class="left">
<div class="scroll-box">
<div class="scroll-inner" id="dataList"></div>
</div>
</div>

<!-- KANAN -->
<div class="right">

<div class="panel">
<b>RESULT PUTARAN</b><br><br>
HARI INI<br>
<b id="tgl"></b><br><br>
UPDATE<br>
<b id="jam"></b>
</div>

<div class="panel">
<b>BANNER ATAS</b><br><br>
BANNER 1 : 01<br>
BANNER 2 : 02
</div>

<!-- INI UNTUK GIF / VIDEO -->
<div class="big-banner">
MASUKKAN GIF / VIDEO DI SINI
</div>

</div>
</div>
</div>

<script>
const list = [
  {nama:"DARWIN 4D", angka:"5432"},
  {nama:"GERMANY PLUS", angka:"5643"},
  {nama:"MALIBU 4D", angka:"5567"},
  {nama:"LIVERPOOL LOTTERY", angka:"7812"},
  {nama:"BULLS EYE", angka:"3346"},
  {nama:"CANADA", angka:"6654"},
  {nama:"BRAZIL", angka:"7785"},
  {nama:"MALIBU CITY POOLS", angka:"1298"},
  {nama:"WINCHESTER LOTTERY", angka:"4421"},
  {nama:"PARIS LOTTERY", angka:"6399"},
  {nama:"MONGOLIA", angka:"8831"},
  {nama:"ANKARA POOLS", angka:"8812"},
  {nama:"PATTAYA LOTTERY", angka:"4567"},
  {nama:"HOKI DRAW", angka:"5678"},
  {nama:"BARCELONA", angka:"4457"},
  {nama:"MANILA POOLS", angka:"6401"},
  {nama:"ORLANDO", angka:"7012"},
  {nama:"TOREGON 13:00", angka:"2291"},
  {nama:"TEXAS DAY", angka:"1678"},
  {nama:"TEXAS EVENING", angka:"4412"}
];

const data = document.getElementById('dataList');

function render(){
  let html="";
  list.forEach(item=>{
    html += `<div class='cell'>
      ${item.nama} <span class='num'>${item.angka}</span>
    </div>`;
  });

  html += html; // biar scroll nyambung
  data.innerHTML = html;
}

render();

function updateTime(){
  let now=new Date();
  document.getElementById('tgl').innerText=
    now.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('jam').innerText=
    now.toLocaleTimeString('id-ID');
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
