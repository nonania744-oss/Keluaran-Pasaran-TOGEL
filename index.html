.wrap{max-width:1200px;margin:auto}

/* HEADER */
.top{background:#d8dce0;color:#000;text-align:center;padding:10px}
.banner-row{display:flex}
.banner{flex:1;height:60px;background:#d80b2e;display:flex;align-items:center;justify-content:center;font-weight:bold}

/* TEXT JALAN */
.ticker{background:#d80b2e;padding:8px;overflow:hidden;white-space:nowrap}
.ticker span{display:inline-block;padding-left:100%;animation:marq 15s linear infinite}
@keyframes marq{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* LAYOUT */
.main{display:flex}
.left{flex:2}
.right{flex:1;padding:10px}

/* SCROLL PASARAN */
.scroll-box{height:420px;overflow:hidden;position:relative}
.scroll-inner{position:absolute;width:100%;animation:scrollUp 15s linear infinite}
@keyframes scrollUp{0%{top:0}100%{top:-50%}}

.cell{
border:1px solid #d80b2e;
padding:12px;
text-align:center;
}

.num{
background:#0d0631;
padding:4px 10px;
border-radius:8px;
margin-left:6px;
}

/* PANEL KANAN */
.panel{
border:1px solid #14c6d1;
padding:12px;
margin-bottom:10px;
border-radius:10px;
}

/* BANNER BESAR */
.big-banner{
height:260px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-weight:bold;
}

</head>
